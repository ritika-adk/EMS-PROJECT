<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>404 - Page Not Found</title>
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
 <style>
   body {
     font-family: 'Poppins', sans-serif;
     background: linear-gradient(to right, #e3f2fd, #fce4ec);
     height: 100vh; display: flex; align-items: center; justify-content: center;
   }
   .error-code { font-size: 8rem; font-weight: bold; color: #d32f2f; animation: bounce 1s infinite alternate; }
   @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
   .btn-home { background-color: #1976d2; color: white; border-radius: 8px; padding: 10px 20px; text-decoration: none; }
   .btn-home:hover { background-color: #0d47a1; }
 </style>
</head>
<body>
 <div class="text-center">
   <div class="error-code">404</div>
   <h4>Oops! Page Not Found</h4>
   <p>The page you're looking for doesn't exist or was moved.</p>
   <a href="/" class="btn-home">Go to Homepage</a>
 </div>
</body>
</html>
