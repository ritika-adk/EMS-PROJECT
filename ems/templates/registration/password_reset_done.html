{% extends 'base.html' %}
{% block title %}Reset Email Sent — EventHive{% endblock %}

{% block content %}
<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
      <div class="card auth-card p-4 p-md-5 text-center">

        <i class="bi bi-envelope-check display-6"
           style="color: var(--accent);"></i>

        <h3 class="mt-3">Check Your Email</h3>

        <p class="text-muted-soft small">
          If an account exists with the email you entered,
          we've sent instructions for resetting your password.
        </p>

        <a href="{% url 'login' %}" class="btn btn-primary w-100 mt-3">
          Back to Login
        </a>

      </div>
    </div>
  </div>
</section>
{% endblock %}
