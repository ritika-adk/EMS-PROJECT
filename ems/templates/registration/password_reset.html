{% extends 'base.html' %}
{% block title %}Forgot Password — EventHive{% endblock %}

{% block content %}
<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
      <div class="card auth-card p-4 p-md-5">

        <div class="text-center mb-4">
          <i class="bi bi-key display-6" style="color: var(--accent);"></i>
          <h3 class="mt-2 mb-0">Forgot Password?</h3>
          <p class="text-muted-soft small">
            Enter your registered email address and we'll send you a password reset link.
          </p>
        </div>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label for="id_email" class="form-label">Email Address</label>
            <input
              type="email"
              name="email"
              id="id_email"
              class="form-control"
              placeholder="Enter your email"
              required
            >
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Send Reset Link
          </button>
        </form>

        <p class="text-center small text-muted-soft mt-4 mb-0">
          Remember your password?
          <a href="{% url 'login' %}">Back to Login</a>
        </p>

      </div>
    </div>
  </div>
</section>
{% endblock %}
