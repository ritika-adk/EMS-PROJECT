{% extends 'base.html' %}
{% block title %}Password Reset Complete — EventHive{% endblock %}

{% block content %}
<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
      <div class="card auth-card p-4 p-md-5 text-center">

        <i class="bi bi-check-circle display-6"
           style="color: var(--accent);"></i>

        <h3 class="mt-3">Password Reset Successful!</h3>

        <p class="text-muted-soft small">
          Your password has been changed successfully.
          You can now log in using your new password.
        </p>

        <a href="{% url 'login' %}"
           class="btn btn-primary w-100 mt-3">
          Login Now
        </a>

      </div>
    </div>
  </div>
</section>
{% endblock %}
